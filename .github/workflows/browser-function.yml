name: Build and push browser function

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get short SHA
        id: get_sha
        run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Log into ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Registry
        uses: docker/login-action@v2
        with:
          registry: musecr.azurecr.cn
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push Docker image for browser function
        uses: docker/build-push-action@v4
        timeout-minutes: 10  # 10 分钟超时
        with:
          context: ./functions/browser
          push: true
          tags: |
            ghcr.io/bmrlab/browser-function:${{ env.SHA }}
            ghcr.io/bmrlab/browser-function:latest
            musecr.azurecr.cn/bmrlab/browser-function:${{ env.SHA }}
            musecr.azurecr.cn/bmrlab/browser-function:latest


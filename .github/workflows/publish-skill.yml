# =====================================================
# Publish atypica Skills
# =====================================================
#
# 这个 workflow 会自动将 skill 文件同步到独立仓库
#
# 配置步骤：
#
# 1. 创建 Fine-grained Personal Access Token (推荐)
#    - 访问: https://github.com/settings/personal-access-tokens/new
#    - Token name: atypica-skill-publish
#    - Expiration: 选择你需要的期限
#    - Repository access: 选择 "Only select repositories"
#      → 在下拉菜单选择:
#        - bmrlab/atypica-research-skill
#        - bmrlab/atypica-agent-skill
#    - Permissions → Repository permissions:
#      → Contents: Read and write ✅
#    - 点击 Generate token，复制生成的 token (github_pat_xxxx...)
#
#    如果使用 Classic Token (不推荐):
#    - 访问: https://github.com/settings/tokens/new
#    - Scopes: 勾选 "repo"
#
# 2. 添加 Secret 到主仓库
#    - 访问: https://github.com/bmrlab/atypica-llm-app/settings/secrets/actions
#    - 点击 "New repository secret"
#    - Name: SKILL_REPO_TOKEN
#    - Value: 粘贴刚才的 token
#    - 点击 "Add secret"
#
# 3. 创建目标仓库 (如果还没有)
#    - atypica-research-skill: https://github.com/bmrlab/atypica-research-skill
#    - atypica-agent-skill: https://github.com/bmrlab/atypica-agent-skill
#    - 设置为 Public
#    - 不要勾选 "Initialize with README"
#
# 4. 首次手动初始化 (只需一次，每个仓库)
#    ```bash
#    # atypica-research-skill
#    git clone git@github.com:bmrlab/atypica-research-skill.git
#    cd atypica-research-skill
#    cp -r ../atypica-llm-app/src/app/(open)/skills/atypica-research/* .
#    git add .
#    git commit -m "Initial commit"
#    git push origin main
#
#    # atypica-agent-skill
#    git clone git@github.com:bmrlab/atypica-agent-skill.git
#    cd atypica-agent-skill
#    cp -r ../atypica-llm-app/src/app/(open)/skills/atypica-agent/* .
#    git add .
#    git commit -m "Initial commit"
#    git push origin main
#    ```
#
# 之后，每次修改主仓库的 skill 文件并推送到 main，都会自动同步
#
# =====================================================

name: Publish Skills

on:
  push:
    branches: [main]
    paths:
      - 'src/app/(open)/skills/atypica-research/**'
      - 'src/app/(open)/skills/atypica-agent/**'
  workflow_dispatch:
    branches: [main]

jobs:
  publish-research:
    runs-on: ubuntu-latest
    # Note: paths filter in 'on' section already ensures this workflow only triggers when
    # research or agent skill files change. We intentionally let both jobs start and rely on
    # the downstream git diff check to no-op the unrelated repo.
    #
    # The old job-level `if` is kept here as a comment for reference because it looks reasonable
    # at first glance, but it is wrong for push events:
    # - `github.event.head_commit.modified` is an array of full file paths from only the HEAD commit
    # - `contains(array, 'dir/')` checks for an exact array element, not a prefix match
    # - result: the workflow triggers via `on.push.paths`, but both jobs evaluate to skipped
    #
    # if: contains(github.event.head_commit.modified, 'src/app/(open)/skills/atypica-research/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone atypica-research-skill repo
        env:
          SKILL_REPO_TOKEN: ${{ secrets.SKILL_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${SKILL_REPO_TOKEN}@github.com/bmrlab/atypica-research-skill.git skill-repo

      - name: Sync atypica-research files
        run: |
          cp -r "src/app/(open)/skills/atypica-research/"* skill-repo/
          cd skill-repo

          SYNC_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          SYNC_COMMIT_SHORT=${GITHUB_SHA:0:7}
          SYNC_COMMIT_FULL=${{ github.sha }}
          SYNC_ACTOR=${{ github.actor }}

          cat > SYNC_INFO.md << SYNCEOF
          # Sync Information

          This repository is auto-synced from [atypica-llm-app](https://github.com/bmrlab/atypica-llm-app).

          - **Last sync**: ${SYNC_DATE}
          - **Source commit**: [\`${SYNC_COMMIT_SHORT}\`](https://github.com/bmrlab/atypica-llm-app/commit/${SYNC_COMMIT_FULL})
          - **Triggered by**: ${SYNC_ACTOR}

          ## Do not edit files directly in this repository

          All changes should be made in the main repository under:
          \`src/app/(open)/skills/atypica-research/\`
          SYNCEOF

      - name: Commit and push
        working-directory: skill-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --staged --quiet; then
            echo "✅ No changes to publish"
            exit 0
          fi

          git commit -m "Auto-sync from atypica-llm-app@${GITHUB_SHA:0:7}

          Source: https://github.com/bmrlab/atypica-llm-app/commit/${{ github.sha }}
          Triggered by: ${{ github.actor }}"

          git push origin main
          echo "✅ Successfully published to atypica-research-skill"

  publish-agent:
    runs-on: ubuntu-latest
    # Note: paths filter in 'on' section already ensures this workflow only triggers when
    # research or agent skill files change. We intentionally let both jobs start and rely on
    # the downstream git diff check to no-op the unrelated repo.
    #
    # The old job-level `if` is kept here as a comment for reference because it looks reasonable
    # at first glance, but it is wrong for push events:
    # - `github.event.head_commit.modified` is an array of full file paths from only the HEAD commit
    # - `contains(array, 'dir/')` checks for an exact array element, not a prefix match
    # - result: the workflow triggers via `on.push.paths`, but both jobs evaluate to skipped
    #
    # if: contains(github.event.head_commit.modified, 'src/app/(open)/skills/atypica-agent/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone atypica-agent-skill repo
        env:
          SKILL_REPO_TOKEN: ${{ secrets.SKILL_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${SKILL_REPO_TOKEN}@github.com/bmrlab/atypica-agent-skill.git skill-repo

      - name: Sync atypica-agent files
        run: |
          cp -r "src/app/(open)/skills/atypica-agent/"* skill-repo/
          cd skill-repo

          SYNC_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          SYNC_COMMIT_SHORT=${GITHUB_SHA:0:7}
          SYNC_COMMIT_FULL=${{ github.sha }}
          SYNC_ACTOR=${{ github.actor }}

          cat > SYNC_INFO.md << SYNCEOF
          # Sync Information

          This repository is auto-synced from [atypica-llm-app](https://github.com/bmrlab/atypica-llm-app).

          - **Last sync**: ${SYNC_DATE}
          - **Source commit**: [\`${SYNC_COMMIT_SHORT}\`](https://github.com/bmrlab/atypica-llm-app/commit/${SYNC_COMMIT_FULL})
          - **Triggered by**: ${SYNC_ACTOR}

          ## Do not edit files directly in this repository

          All changes should be made in the main repository under:
          \`src/app/(open)/skills/atypica-agent/\`
          SYNCEOF

      - name: Commit and push
        working-directory: skill-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --staged --quiet; then
            echo "✅ No changes to publish"
            exit 0
          fi

          git commit -m "Auto-sync from atypica-llm-app@${GITHUB_SHA:0:7}

          Source: https://github.com/bmrlab/atypica-llm-app/commit/${{ github.sha }}
          Triggered by: ${{ github.actor }}"

          git push origin main
          echo "✅ Successfully published to atypica-agent-skill"

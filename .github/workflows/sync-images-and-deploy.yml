name: Sync images to Azure Registry and Deploy

on:
  workflow_run:
    workflows: ["Build and push atypica-llm-app"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to sync and deploy'
        required: true
        default: 'latest'

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Get version from workflow_run or input
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            # Extract version from the triggering workflow's ref
            VERSION=$(echo "${{ github.event.workflow_run.head_branch }}" | sed 's/refs\/tags\///')
            if [[ ! $VERSION =~ ^v.* ]]; then
              VERSION="latest"
            fi
            echo "VERSION=$VERSION" >> $GITHUB_ENV
          fi

      - name: Log into ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Azure Docker Registry
        uses: docker/login-action@v2
        with:
          registry: musecr.azurecr.cn
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Sync main app image to Azure Registry
        run: |
          # Pull from ghcr.io
          docker pull ghcr.io/bmrlab/atypica-llm-app:${{ env.VERSION }}

          # Tag for Azure Registry
          docker tag ghcr.io/bmrlab/atypica-llm-app:${{ env.VERSION }} musecr.azurecr.cn/bmrlab/atypica-llm-app:${{ env.VERSION }}

          # Push to Azure Registry
          docker push musecr.azurecr.cn/bmrlab/atypica-llm-app:${{ env.VERSION }}

          # Also sync latest tag if this is a versioned release
          if [[ "${{ env.VERSION }}" =~ ^v.* ]]; then
            docker pull ghcr.io/bmrlab/atypica-llm-app:latest
            docker tag ghcr.io/bmrlab/atypica-llm-app:latest musecr.azurecr.cn/bmrlab/atypica-llm-app:latest
            docker push musecr.azurecr.cn/bmrlab/atypica-llm-app:latest
          fi

      - name: Sync jobs image to Azure Registry
        run: |
          # Pull from ghcr.io
          docker pull ghcr.io/bmrlab/atypica-llm-app:${{ env.VERSION }}-job

          # Tag for Azure Registry
          docker tag ghcr.io/bmrlab/atypica-llm-app:${{ env.VERSION }}-job musecr.azurecr.cn/bmrlab/atypica-llm-app:${{ env.VERSION }}-job

          # Push to Azure Registry
          docker push musecr.azurecr.cn/bmrlab/atypica-llm-app:${{ env.VERSION }}-job

          # Also sync latest tag if this is a versioned release
          if [[ "${{ env.VERSION }}" =~ ^v.* ]]; then
            docker pull ghcr.io/bmrlab/atypica-llm-app:latest-job
            docker tag ghcr.io/bmrlab/atypica-llm-app:latest-job musecr.azurecr.cn/bmrlab/atypica-llm-app:latest-job
            docker push musecr.azurecr.cn/bmrlab/atypica-llm-app:latest-job
          fi

      - name: Setup Kubernetes Config And Update Deployment
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_MUSE_CLUSTER }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          export KUBECONFIG=$HOME/.kube/config

          # Update deployment in China region
          kubectl config use-context muse-aws-cn-prod
          kubectl set image deployment/atypica-llm-app atypica-llm-app=musecr.azurecr.cn/bmrlab/atypica-llm-app:${{ env.VERSION }} --namespace bmrlab

          # Update deployment in US region
          kubectl config use-context muse-aws-us-prod
          kubectl set image deployment/atypica-llm-app atypica-llm-app=musecr.azurecr.cn/bmrlab/atypica-llm-app:${{ env.VERSION }} --namespace bmrlab

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: atypica-postgres
    environment:
      POSTGRES_USER: atypica
      POSTGRES_PASSWORD: atypica
      POSTGRES_DB: atypica_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  postgres_data:

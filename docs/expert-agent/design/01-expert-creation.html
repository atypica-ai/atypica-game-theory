<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>添加知识源 - Expert Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: oklch(0.985 0 0);
      color: oklch(0.145 0 0);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    
    .container { width: 100%; max-width: 800px; }
    
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .header h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .header p {
      font-size: 15px;
      color: oklch(0.556 0 0);
      max-width: 600px;
      margin: 0 auto;
    }
    
    .card {
      background: oklch(1 0 0);
      border: 1px solid oklch(0.922 0 0);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 1px 3px oklch(0 0 0 / 0.05);
    }
    
    .upload-area {
      border: 2px dashed oklch(0.922 0 0);
      border-radius: 12px;
      padding: 48px 32px;
      text-align: center;
      background: oklch(0.985 0 0);
      transition: all 0.2s;
      cursor: pointer;
      margin-bottom: 24px;
    }
    
    .upload-area:hover {
      border-color: oklch(0.87 0.29 142.57);
      background: oklch(0.87 0.29 142.57 / 0.05);
    }
    
    .upload-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      background: oklch(0.87 0.29 142.57 / 0.1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .upload-title { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
    .upload-desc { font-size: 14px; color: oklch(0.556 0 0); margin-bottom: 16px; }
    .upload-hint { font-size: 13px; color: oklch(0.556 0 0); }
    .upload-link { color: oklch(0.87 0.29 142.57); text-decoration: underline; cursor: pointer; }
    
    .input-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .input-option {
      padding: 20px;
      border: 1px solid oklch(0.922 0 0);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .input-option:hover {
      border-color: oklch(0.87 0.29 142.57);
      background: oklch(0.87 0.29 142.57 / 0.05);
    }
    
    .option-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: oklch(0.985 0 0);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .option-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .option-desc { font-size: 12px; color: oklch(0.556 0 0); }
    
    .source-limit {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: oklch(0.985 0 0);
      border-radius: 12px;
      margin-bottom: 24px;
    }
    
    .limit-bar {
      height: 6px;
      background: oklch(0.922 0 0);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 8px;
    }
    
    .limit-progress {
      height: 100%;
      background: oklch(0.87 0.29 142.57);
      border-radius: 3px;
      transition: width 0.3s;
    }
    
    .file-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    
    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: oklch(0.985 0 0);
      border: 1px solid oklch(0.922 0 0);
      border-radius: 8px;
    }
    
    .file-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: oklch(1 0 0);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-meta { font-size: 12px; color: oklch(0.556 0 0); margin-top: 2px; }
    
    .file-remove {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: none;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .file-remove:hover { background: oklch(0.577 0.245 27.325 / 0.1); }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: oklch(0 0 0 / 0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal.active { display: flex; }
    
    .modal-content {
      background: oklch(1 0 0);
      border-radius: 16px;
      padding: 32px;
      max-width: 500px;
      width: 90%;
    }
    
    .modal-header { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
    
    .form-input, .form-textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid oklch(0.922 0 0);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    
    .form-textarea { resize: vertical; min-height: 120px; }
    
    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: oklch(0.87 0.29 142.57);
      box-shadow: 0 0 0 3px oklch(0.87 0.29 142.57 / 0.1);
    }
    
    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    
    .btn-secondary {
      background: oklch(0.97 0 0);
      color: oklch(0.145 0 0);
      border: 1px solid oklch(0.922 0 0);
    }
    
    .btn-primary {
      background: oklch(0.87 0.29 142.57);
      color: oklch(1 0 0);
    }
    
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .actions { display: flex; gap: 12px; justify-content: flex-end; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>添加知识源</h1>
      <p>上传文档、粘贴文本或添加网站链接，让专家智能体基于这些信息构建知识体系</p>
    </div>

    <div class="card">
      <div class="upload-area" id="uploadArea">
        <div class="upload-icon">
          <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
          </svg>
        </div>
        <div class="upload-title">Upload sources</div>
        <div class="upload-desc">
          Drag & drop or <span class="upload-link">choose file</span> to upload
        </div>
        <div class="upload-hint">Supported file types: PDF, .txt, Markdown, Audio (e.g. mp3), .docx</div>
      </div>

      <div class="input-options">
        <div class="input-option" onclick="openModal('websiteModal')">
          <div class="option-icon">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path>
            </svg>
          </div>
          <div>
            <div class="option-title">Website</div>
            <div class="option-desc">添加网页 URL</div>
          </div>
        </div>

        <div class="input-option" onclick="openModal('textModal')">
          <div class="option-icon">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
          </div>
          <div>
            <div class="option-title">Paste text</div>
            <div class="option-desc">直接粘贴文本内容</div>
          </div>
        </div>
      </div>

      <div id="fileListSection" style="display: none;">
        <div style="font-size: 14px; font-weight: 500; margin-bottom: 12px; color: oklch(0.556 0 0);">
          已添加的源 (<span id="sourceCount">0</span>)
        </div>
        <div class="file-list" id="fileList"></div>
      </div>

      <div class="source-limit">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
        </svg>
        <div style="flex: 1;">
          <div style="display: flex; justify-content: space-between; font-size: 13px;">
            <span>Source limit</span>
            <span style="font-weight: 500;"><span id="currentCount">0</span> / 10</span>
          </div>
          <div class="limit-bar">
            <div class="limit-progress" id="limitProgress" style="width: 0%"></div>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-secondary" onclick="history.back()">取消</button>
        <button class="btn btn-primary" id="nextBtn" disabled onclick="next()">下一步</button>
      </div>
    </div>
  </div>

  <div class="modal" id="websiteModal">
    <div class="modal-content">
      <h3 class="modal-header">添加网站链接</h3>
      <form onsubmit="addWebsite(event)">
        <div class="form-group">
          <label class="form-label">网站 URL</label>
          <input type="url" class="form-input" id="websiteUrl" placeholder="https://example.com" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('websiteModal')">取消</button>
          <button type="submit" class="btn btn-primary">添加</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal" id="textModal">
    <div class="modal-content">
      <h3 class="modal-header">粘贴文本</h3>
      <form onsubmit="addText(event)">
        <div class="form-group">
          <label class="form-label">文本内容</label>
          <textarea class="form-textarea" id="textContent" placeholder="粘贴或输入文本内容..." required></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('textModal')">取消</button>
          <button type="submit" class="btn btn-primary">添加</button>
        </div>
      </form>
    </div>
  </div>

  <input type="file" id="fileInput" style="display: none;" multiple accept=".pdf,.txt,.md,.mp3,.docx">

  <script>
    const MAX = 10;
    let sources = [];

    document.getElementById('uploadArea').onclick = () => {
      if (sources.length < MAX) document.getElementById('fileInput').click();
    };

    document.getElementById('fileInput').onchange = (e) => {
      const files = Array.from(e.target.files).slice(0, MAX - sources.length);
      files.forEach(f => sources.push({ type: 'file', name: f.name, size: formatSize(f.size) }));
      update();
      e.target.value = '';
    };

    function openModal(id) {
      if (sources.length >= MAX) return alert('最多10个源');
      document.getElementById(id).classList.add('active');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }

    function addWebsite(e) {
      e.preventDefault();
      const url = document.getElementById('websiteUrl').value;
      sources.push({ type: 'web', name: new URL(url).hostname, url });
      update();
      closeModal('websiteModal');
      document.getElementById('websiteUrl').value = '';
    }

    function addText(e) {
      e.preventDefault();
      const text = document.getElementById('textContent').value;
      const textCount = sources.filter(s => s.type === 'text').length;
      sources.push({ type: 'text', name: 'Text ' + (textCount + 1), preview: text.slice(0, 50) + '...' });
      update();
      closeModal('textModal');
      document.getElementById('textContent').value = '';
    }

    function remove(i) {
      sources.splice(i, 1);
      update();
    }

    function update() {
      const n = sources.length;
      document.getElementById('currentCount').textContent = n;
      document.getElementById('sourceCount').textContent = n;
      document.getElementById('limitProgress').style.width = (n / MAX * 100) + '%';
      document.getElementById('nextBtn').disabled = n === 0;
      document.getElementById('fileListSection').style.display = n ? 'block' : 'none';

      document.getElementById('fileList').innerHTML = sources.map((s, i) => {
        const icons = {
          file: 'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z',
          web: 'M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9',
          text: 'M4 6h16M4 12h16M4 18h7'
        };
        const meta = s.type === 'file' ? s.size : (s.type === 'web' ? s.url : s.preview);
        return `<div class="file-item">
          <div class="file-icon">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${icons[s.type]}"></path>
            </svg>
          </div>
          <div class="file-info">
            <div class="file-name">${s.name}</div>
            <div class="file-meta">${meta}</div>
          </div>
          <button class="file-remove" onclick="remove(${i})">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>`;
      }).join('');
    }

    function formatSize(b) {
      const k = 1024, s = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(b) / Math.log(k));
      return (b / Math.pow(k, i)).toFixed(1) + ' ' + s[i];
    }

    function next() {
      alert('Sources: ' + JSON.stringify(sources.map(s => s.name)));
    }

    document.querySelectorAll('.modal').forEach(m => {
      m.onclick = (e) => { if (e.target === m) m.classList.remove('active'); };
    });
  </script>
</body>
</html>
